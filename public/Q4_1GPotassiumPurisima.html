<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <title>Movie Rating</title>

    <style>
        body {
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;

            background-image: url();
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
        }

        .container {
            font-size: 60px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2, h3 { text-align: center; color: #ffffff; }

        .stars {
            font-size: 24px;
            cursor: pointer;
            color: #ccc;
            margin-bottom: 15px;
        }

        .star.selected { color: #ffcc00; }


    </style>
    <body>

    <div class = "container">
        <h2> Add a Movie </h2>
    </div>

    <div class = "form-group">
        <label> Title: </label>
        <input type = "text" id = "title" placeholder = "Enter movie title">
    </div>

    <div class = "form-group">
        <label> Year: </label>
        <input type = "number" id = "year" placeholder = "2026">
    </div>

    <div class = "form-group">
        <label> Genre: </label>
            <select id = "genre">
            <option value="action">Action</option>
            <option value="comedy">Comedy</option>
            <option value="drama">Drama</option>
            <option value="horror">Horror</option>
            <option value="romance">Romance</option>
            <option value="documentary">Documentary</option>
        </select>
    </div>

    <label>Rating:</label>
    <div class="stars" id="starContainer">
        <span class="star" data-value="1">★</span>
        <span class="star" data-value="2">★</span>
        <span class="star" data-value="3">★</span>
        <span class="star" data-value="4">★</span>
        <span class="star" data-value="5">★</span>
    </div>

    <button onclick="addMovie()">Add Movie</button>

    <hr>
    <h3> Movie List </h3>
    <div id = "movlist"></div>
</div>

<script>
    let currentRate = 0;
    const stars = document.querySelectorAll('.star');

    stars.forEach(star => {
        star.addEventListener('click', () => {
            currentRate = parseInt(star.getAttribute('data-value'));
            updateStars(currentRate);
        });
    });

    function nowStars(rating){
        stars.forEach(star => {
            const starValue = parseInt(star.getAttribute('data-value'));
            star.classList.toggle('selected', starValue <= rating);
        });
    }

    function addMov(){
        const title = document.getElementById('title').value;
        const year = document.getElementById('year').value;
        const genre = document.getElementById('genre').value;

        if (!title || !year || !genre) {
            alert('Please fill in all fields and enter a rating.');
            return;
        }

    }
        
        const newMovie = {
            title: title,
            year: year,
            genre: genre,
            rating: currentRate
        }

        const movies =  JSON.parse(localStorage.getItem('movies')) || [];
        movies.push(newMovie);
        
        localStorage.setItem('movies', JSON.stringify(movies));
        clearForm();
        displayMovies();

        function clearForm(){
            document.getElementById('title').value = '';
            document.getElementById('year').value = '';
            document.getElementById('genre').value = '';
            currentRate = 0;
            nowStars(0);
        }

        function displayMov(){
            const movies = JSON.parse(localStorage.getItem('movies')) || [];
            const movList = document.getElementById('movlist');
            movList.innerHTML = '';

            movies.forEach(movie => {
                const starString = '★'.repeat(movie.rating);
                const movieItem = document.createElement('div');
                movieItem.innerHTML = `<strong>${movie.title}</strong> (${movie.year}) - ${movie.genre} - Rating: ${movie.rating}/5`;
                movList.appendChild(movieItem);
            });
        }

        displayMovies();

</script>


    </body>
